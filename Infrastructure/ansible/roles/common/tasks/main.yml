---
# 1. We must ensure the secondary VNIC (Public Subnet) is active and has an IP address.
# OCI Ubuntu images don't always auto-configure hot-plugged secondary interfaces.
- name: Determine secondary interface name
  set_fact:
    secondary_iface: "{{ (ansible_interfaces | reject('equalto', 'lo') | reject('equalto', ansible_default_ipv4.interface) | list | sort)[0] }}"

- name: Clean up any misconfigured netplan files
  shell: rm -f /etc/netplan/99-*.yaml

- name: Create Netplan configuration for secondary VNIC
  copy:
    dest: "/etc/netplan/99-{{ secondary_iface }}.yaml"
    mode: '0600'
    content: |
      network:
        version: 2
        ethernets:
          {{ secondary_iface }}:
            match:
              name: {{ secondary_iface }}
            dhcp4: true
            dhcp4-overrides:
              route-metric: 50
  register: netplan_config

- name: Apply Netplan and wait for DHCP
  shell: |
    netplan apply
    sleep 5
  when: netplan_config.changed

- name: Wait for internet connectivity (ping 8.8.8.8)
  command: ping -c 1 8.8.8.8
  register: ping_result
  until: ping_result.rc == 0
  retries: 10
  delay: 10

- name: Update apt cache
  apt:
    update_cache: yes
    cache_valid_time: 3600
