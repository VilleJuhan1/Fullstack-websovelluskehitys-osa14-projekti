---
- name: Configure Common OS Settings
  hosts: k3s_cluster
  become: yes
  roles:
    - common

- name: Configure Master Node
  hosts: k3s_master
  become: yes
  roles:
    - k3s_master

- name: Configure Storage and Worker Node
  hosts: k3s_worker
  become: yes
  roles:
    - storage
    - k3s_worker
